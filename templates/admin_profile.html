<!DOCTYPE html>
<html>
<head>
<title>Heal Care - Manage Admins</title>

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

body{
    font-family:'Poppins',sans-serif;
    background:linear-gradient(to right,#eef2f3,#f9fbfd);
}

/* HEADER */
.header{
    text-align:center;
    margin-bottom:30px;
}

.header img{
    height:70px;
}

.header h2{
    font-weight:600;
    color:#2c3e50;
    margin-top:10px;
}

/* CARD */
.card-box{
    background:white;
    border-radius:12px;
    padding:25px;
    box-shadow:0 5px 20px rgba(0,0,0,0.08);
    transition:0.3s;
}

.card-box:hover{
    transform:translateY(-3px);
}

/* TITLE */
.title{
    font-weight:600;
    color:#34495e;
    margin-bottom:15px;
}

/* INPUT */
.form-control{
    border-radius:8px;
    font-size:14px;
    border:1px solid #ddd;
}

/* BUTTON */
.btn-primary{
    background:#3498db;
    border:none;
    border-radius:8px;
    font-weight:500;
}

.btn-primary:hover{
    background:#2980b9;
}

/* TABLE */
.table{
    background:white;
    border-radius:10px;
    overflow:hidden;
}

.table th{
    background:#ecf0f1;
    font-weight:600;
}

/* STATUS */
.active{
    color:#27ae60;
    font-weight:600;
}

.inactive{
    color:#e74c3c;
    font-weight:600;
}

/* FLOAT BACK BUTTON */
.floating-back{
    position:fixed;
    bottom:20px;
    right:20px;
    background:#1565c0;
    color:white;
    padding:12px 18px;
    border-radius:30px;
    text-decoration:none;
    box-shadow:0 8px 20px rgba(0,0,0,0.2);
    transition:0.3s;
}

/* PASSWORD ICON */
.eye{
    position:absolute;
    right:12px;
    top:10px;
    cursor:pointer;
    font-size:14px;
    color:#555;
}

/* SMALL BUTTONS */
.btn-sm{
    border-radius:6px;
}

/* DELETE */
.btn-danger{
    background:#e74c3c;
    border:none;
}

.btn-danger:hover{
    background:#c0392b;
}

/* TOGGLE */
.btn-warning{
    background:#f39c12;
    border:none;
}

.btn-warning:hover{
    background:#d68910;
}

</style>

</head>

<body>

<div class="container mt-4">

<!-- 🔷 HEADER WITH LOGO -->
<div class="header">

    <div style="display:flex; align-items:center; gap:12px;">
        <img src="/static/logo.png" alt="logo" style="height:170px;">

        <div>
            Heal Care Hospital<br>
            <span style="font-size:20px; opacity:0.8;">Admin Profile</span>
        </div>
    </div>

<div class="row">

<!-- CREATE ADMIN -->
<div class="col-md-4">
<div class="card-box">

<h4 class="title">Create Admin</h4>

<form method="POST">

<input type="text" name="username" placeholder="Username"
required class="form-control mb-3">

<!-- PASSWORD FIELD -->
<div style="position:relative;">
<input type="password" id="password" name="password"
placeholder="Password" required class="form-control mb-3">

<span class="eye" onclick="togglePassword()">👁️</span>
</div>

<button class="btn btn-primary w-100">
Create Admin
</button>

</form>

</div>
</div>

<!-- ADMIN LIST -->
<div class="col-md-8">
<div class="card-box">

<h4 class="title">All Admins</h4>

<table class="table table-bordered table-hover text-center align-middle">

<tr>
<th>ID</th>
<th>Username</th>
<th>Password</th>
<th>Status</th>
<th>Action</th>
</tr>

{% for a in admins %}
<tr>

<td>{{ a[0] }}</td>

<td><strong>{{ a[1] }}</strong></td>

<!-- PASSWORD -->
<td>
    <span id="pass{{a[0]}}" data-pass="{{a[2]}}">
        ********
    </span>

    <button type="button" onclick="togglePass('{{a[0]}}')" 
    class="btn btn-sm btn-light">
        👁️
    </button>
</td>

<!-- STATUS -->
<td class="{% if a[3]=='Active' %}active{% else %}inactive{% endif %}">
{{ a[3] }}
</td>

<!-- ACTION -->
<td>

<!-- TOGGLE -->
<a href="/toggle_admin/{{ a[0] }}" class="btn btn-warning btn-sm">
Toggle
</a>

<!-- DELETE -->
<form action="/delete_admin/{{ a[0] }}" method="POST" style="display:inline;">
    <button class="btn btn-sm btn-danger"
    onclick="return confirm('Delete this admin?')">
    Delete
    </button>
</form>

</td>

</tr>
{% endfor %}

</table>

</div>
</div>

</div>

</div>

<script>
function togglePassword(){
    var x = document.getElementById("password");
    if(x.type === "password"){
        x.type = "text";
    } else {
        x.type = "password";
    }
}
</script>

<script>
function togglePass(id){
    let el = document.getElementById("pass" + id);

    if(el.innerText === "********"){
        el.innerText = el.getAttribute("data-pass");
    } else {
        el.innerText = "********";
    }
}
</script>
<!-- 🔵 FLOAT BUTTON -->
<a href="/admin_dashboard" class="floating-back">⬅ Dashboard</a><br>
</body>
</html>
