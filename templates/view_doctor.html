<!DOCTYPE html>
<html>
<head>
<title>Doctor Profile</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">

<style>
body{
    font-family:'Poppins';
    background:#f4f6f9;
    margin:0;
}

/* CARD */
.profile-card{
    width:500px;
    margin:50px auto;
    background:white;
    padding:30px;
    border-radius:15px;
    box-shadow:0 10px 30px rgba(0,0,0,0.1);
    text-align:center;
}

/* IMAGE */
.profile-card img{
    width:120px;
    height:120px;
    border-radius:50%;
    object-fit:cover;
    margin-bottom:15px;
}

/* DETAILS */
.profile-card h3{
    margin-bottom:5px;
}

.profile-card p{
    color:gray;
    margin:5px 0;
}

/* BACK */
.back{
    display:inline-block;
    margin-top:20px;
    padding:10px 15px;
    background:#0d6efd;
    color:white;
    border-radius:8px;
    text-decoration:none;
}
</style>

</head>
<body>

<div class="profile-card">

    <!-- ✅ PROFILE IMAGE -->
    <img src="{{ url_for('static', filename='uploads/' + doctor[11]) if doctor[11] else 'https://cdn-icons-png.flaticon.com/512/3135/3135715.png' }}">

    <h3>Dr. {{ doctor[1] }}</h3>
    <p>{{ doctor[6] }}</p>

    <hr>

    <p><b>Email:</b> {{ doctor[2] }}</p>
    <p><b>Phone:</b> {{ doctor[3] }}</p>
    <p><b>Username:</b> {{ doctor[4] }}</p>

    <p><b>Status:</b> {{ doctor[7] }}</p>

    <p><b>Shift:</b> {{ doctor[10] }}</p>
    <p><b>Time:</b> {{ doctor[8] }} - {{ doctor[9] }}</p>

    <a href="/manage_doctors" class="back">⬅ Back</a>

</div>

</body>
</html>
