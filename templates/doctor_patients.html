<!DOCTYPE html>
<html>
<head>
<title>Patient List</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

/* 🌐 BODY */
body{
    background:#f4f6f9;
    font-family:'Poppins', sans-serif;
}

/* 🏥 HEADER */
.header{
    text-align:center;
    padding:20px;
    font-weight:600;
    color:#0d6efd;
}

/* 📦 CONTAINER */
.container-box{
    width:90%;
    margin:auto;
}

/* 📊 TABLE DESIGN */
table{
    width:100%;
    border-collapse:collapse;
    background:white;
    border-radius:12px;
    overflow:hidden;
    box-shadow:0 5px 20px rgba(0,0,0,0.08);
}

/* HEADER */
th{
    background:linear-gradient(90deg,#0d6efd,#084298);
    color:white;
    padding:14px;
    text-transform:uppercase;
    font-size:13px;
    letter-spacing:0.5px;
}

/* ROWS */
td{
    padding:14px;
    text-align:center;
    border-bottom:1px solid #eee;
}

/* HOVER EFFECT */
tr:hover{
    background:#f1f7ff;
    transition:0.2s;
}

/* VIEW BUTTON */
.view-btn{
    padding:6px 14px;
    background:#198754;
    color:white;
    border-radius:6px;
    text-decoration:none;
    font-size:13px;
}

.view-btn:hover{
    background:#146c43;
}

/* BACK BUTTON */
.back-btn{
    display:inline-block;
    margin-top:20px;
    padding:10px 20px;
    background:#0d6efd;
    color:white;
    border-radius:8px;
    text-decoration:none;
}

.back-btn:hover{
    background:#084298;
}

</style>

</head>

<body>

<div class="header">
    <h2>👨‍⚕️ My Patients</h2>
</div>

<div class="container-box">

<table>

<tr>
<th>Patient ID</th>
<th>Name</th>
<th>Age</th>
<th>Phone</th>
<th>Place</th>
<th>Report</th>
</tr>

{% for p in patients %}
<tr>
    <td>{{ p[0] }}</td>
    <td>{{ p[1] }}</td>
    <td>{{ p[2] }}</td>
    <td>{{ p[3] }}</td>
    <td>{{ p[4] }}</td>

    <!-- VIEW REPORT -->
    <td>
        <a class="view-btn" href="{{ url_for('view_patient', id=p[0]) }}">
            View Report
        </a>
    </td>
</tr>
{% endfor %}

</table>

<div class="text-center mt-4">
    <a class="back-btn" href="/doctor_dashboard">⬅ Back to Dashboard</a>
</div>

</div>

</body>
</html>
