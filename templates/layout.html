<!DOCTYPE html>
<html>
<head>
<title>Patient Panel</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{ background:#f4f6f9; }

.sidebar{
    height:100vh;
    background:#0d47a1;
    color:white;
    position:fixed;
    width:220px;
    padding:20px;
}

.sidebar a{
    display:block;
    color:white;
    padding:10px;
    text-decoration:none;
    border-radius:8px;
    margin-bottom:10px;
}

.sidebar a:hover{
    background:#1565c0;
}

.content{
    margin-left:240px;
    padding:20px;
}
</style>
</head>

<body>

<div class="sidebar">
    <h4>👤 Patient</h4>

    <a href="/patient_dashboard">🏠 Dashboard</a>
    <a href="/book_appointment">📅 Book Appointment</a>
    <a href="/my_appointments">📋 My Appointments</a>
    <a href="/profile">👤 Profile</a>
    <a href="/reports">📄 My Reports</a>
</div>

<div class="content">
    {% block content %}{% endblock %}
</div>

</body>
</html>
