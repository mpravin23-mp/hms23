<!DOCTYPE html>
<html>
<head>
<title>Add Doctor - Heal Care Hospital</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

/* 🌐 BODY */
body{
    font-family:'Segoe UI', sans-serif;
    background:linear-gradient(135deg,#e0f2fe,#f8fafc);
}

/* 📦 MAIN CARD */
.form-container{
    max-width:700px;
    margin:40px auto;
    background:white;
    padding:30px;
    border-radius:15px;
    box-shadow:0 15px 40px rgba(0,0,0,0.1);
}

/* 🏥 HEADER */
.header{
    display:flex;
    align-items:center;
    gap:15px;
    margin-bottom:20px;
}

.header img{
    height:60px;
    border-radius:12px;
}

.header h2{
    margin:0;
    font-weight:800;
    font-size:26px;
    color:#1e293b;
}

/* 📍 SUBTEXT */
.subtext{
    color:#64748b;
    font-size:14px;
    margin-bottom:20px;
}

/* 🧾 FORM GRID */
.form-group{
    margin-bottom:15px;
}

/* INPUTS */
input, select{
    width:100%;
    padding:10px;
    border-radius:8px;
    border:1px solid #ccc;
    outline:none;
    transition:0.3s;
}

input:focus, select:focus{
    border-color:#2563eb;
    box-shadow:0 0 5px rgba(37,99,235,0.3);
}

/* 🔐 PASSWORD ROW */
.password-box{
    display:flex;
    align-items:center;
    gap:10px;
}

.password-box input{
    flex:1;
}

.password-box button{
    border:none;
    background:#f1f5f9;
    padding:8px 10px;
    border-radius:8px;
    cursor:pointer;
}

/* 📊 BUTTON */
button[type="submit"]{
    width:100%;
    padding:12px;
    border:none;
    border-radius:10px;
    background:linear-gradient(90deg,#2563eb,#38bdf8);
    color:white;
    font-weight:bold;
    margin-top:10px;
    transition:0.3s;
}

button[type="submit"]:hover{
    transform:scale(1.03);
}

/* 🔙 BACK */
.back-btn{
    display:block;
    text-align:center;
    margin-top:15px;
}

/* 🔥 PASSWORD MESSAGE */
#strengthMessage{
    font-size:13px;
}

.back-btn{
    background:#1e293b;
    color:white;
    padding:8px 14px;
    border-radius:8px;
    text-decoration:none;
    font-size:13px;
    transition:0.3s;
}

#profileInput{
    border:none;
    background:#f1f5f9;
    padding:8px;
    border-radius:8px;
    cursor:pointer;
}


.back-btn:hover{
    background:#334155;
}

</style>
</head>

<body>

<div class="form-container">

    <!-- 🏥 HEADER -->
    <div class="header">
        <img src="/static/logo.png">
        <div>
            <h2>Register New Doctor</h2>
            <div class="subtext">Heal Care Hospital • Admin Panel</div>
        </div>
    </div>

    <!-- 📋 FORM -->


    

<form method="POST" enctype="multipart/form-data">
            <!-- ✅ PROFILE IMAGE INSIDE FORM -->
    <div class="form-group" style="text-align:center;">
        <label>Profile Photo</label><br>

        <img id="previewImage"
             src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png"
             style="width:100px; height:100px; border-radius:50%; object-fit:cover; margin-bottom:10px;">
             

<input type="file" name="profile_pic">
    </div>


        <div class="form-group">
            <label>Name</label>
            <input type="text" name="name" required>
        </div>

        <div class="form-group">
            <label>Gender</label>
            <select name="gender" required>
                <option value="">--Select Gender--</option>
                <option>Male</option>
                <option>Female</option>
            </select>
        </div>

        <div class="form-group">
            <label>Specialization</label>
            <select name="specialization" required>
                <option value="">--Select Specialization--</option>
                <option>Cardiology</option>
                <option>Dermatology</option>
                <option>Neurology</option>
                <option>Pediatrics</option>
                <option>Orthopedics</option>
                <option>General Surgery</option>
                <option>ENT</option>
                <option>Psychiatry</option>
                <option>Gynecology</option>
            </select>
        </div>

        <div class="form-group">
            <label>Phone</label>
            <input type="text" name="phone" required>
        </div>

        <div class="form-group">
            <label>Email</label>
            <input type="email" name="email">
        </div>

        <div class="form-group">
            <label>Address</label>
            <input type="text" name="address">
        </div>

        <div class="form-group">
            <label>City</label>
            <input type="text" name="city">
        </div>

        <div class="form-group">
            <label>Username</label>
            <input type="text" name="username" required>
        </div>

        <div class="form-group">
            <label>Password</label>
            <div class="password-box">
                <input type="password" id="password" name="password" onkeyup="checkPasswordStrength()" required>
                <button type="button" onclick="togglePassword()">👁</button>
            </div>
            <div id="strengthMessage"></div>
        </div>

        <div class="form-group">
            <label>Confirm Password</label>
            <div class="password-box">
                <input type="password" id="confirm_password" name="confirm_password" required>
                <button type="button" onclick="toggleConfirmPassword()">👁</button>
            </div>
        </div>

        <div class="form-group">
            <label>Shift Type</label>
            <select name="shift_type" id="shift_type" required>
                <option value="">Select Shift</option>
                <option value="Morning">Morning</option>
                <option value="Afternoon">Afternoon</option>
                <option value="Evening">Evening</option>
            </select>
        </div>

        <div class="form-group">
            <label>Shift Start Time</label>
            <input type="time" name="shift_start_hm" id="shift_start_hm" required readonly>
        </div>

        <div class="form-group">
            <label>Shift End Time</label>
            <input type="time" name="shift_end_hm" id="shift_end_hm" required readonly>
        </div>

        <button type="submit">Register Doctor</button>

    </form>

   <div style="display:flex; justify-content:flex-end; margin-bottom:10px;">
    <a href="/admin_dashboard" class="back-btn">⬅ Dashboard</a>
</div>

</div>

<!-- ✅ KEEP YOUR ORIGINAL SCRIPT (NO CHANGE) -->
<script>
const shiftTimes = {
    "Morning": { start: "09:00", end: "13:00" },
    "Afternoon": { start: "13:30", end: "17:30" },
    "Evening": { start: "18:00", end: "21:00" }
};

document.getElementById('shift_type').addEventListener('change', function() {
    const shift = this.value;
    if (shiftTimes[shift]) {
        document.getElementById('shift_start_hm').value = shiftTimes[shift].start;
        document.getElementById('shift_end_hm').value = shiftTimes[shift].end;
    } else {
        document.getElementById('shift_start_hm').value = "";
        document.getElementById('shift_end_hm').value = "";
    }
});

function checkPasswordStrength(){
    let password = document.getElementById("password").value;
    let strength = document.getElementById("strengthMessage");
    let score = 0;

    if(password.length >= 8) score++;
    if(password.match(/[a-z]/)) score++;
    if(password.match(/[A-Z]/)) score++;
    if(password.match(/[0-9]/)) score++;
    if(password.match(/[^a-zA-Z0-9]/)) score++;

    if(score <= 2) strength.innerHTML = "<span style='color:red'>Weak Password</span>";
    else if(score <= 4) strength.innerHTML = "<span style='color:orange'>Medium Password</span>";
    else strength.innerHTML = "<span style='color:green'>Strong Password</span>";
}

function togglePassword() {
    const pass = document.getElementById("password");
    pass.type = pass.type === "password" ? "text" : "password";
}

function toggleConfirmPassword() {
    const pass = document.getElementById("confirm_password");
    pass.type = pass.type === "password" ? "text" : "password";
}


document.getElementById("profileInput").addEventListener("change", function(event){
    const file = event.target.files[0];

    if(file){
        const reader = new FileReader();

        reader.onload = function(e){
            document.getElementById("previewImage").src = e.target.result;
        }

        reader.readAsDataURL(file);
    }
});

</script>

{% with messages = get_flashed_messages(with_categories=true) %}
{% if messages %}
<div id="toast" style="
position:fixed;
top:20px;
right:20px;
background:#16a34a;
color:white;
padding:15px 25px;
border-radius:10px;
box-shadow:0 5px 15px rgba(0,0,0,0.2);
z-index:9999;
">
    {% for category, message in messages %}
        {{ message }}
    {% endfor %}
</div>




<script>
setTimeout(() => {
    document.getElementById("toast").style.display = "none";
}, 3000);
</script>
{% endif %}
{% endwith %}
</body>
</html>
