<!DOCTYPE html>
<html>
<head>
<title>Doctor Forgot Password - Heal Care Hospital</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

/* HEADER (same as your main site) */
header{
background:#0d6efd;
color:white;
padding:18px 40px;
display:flex;
align-items:center;
justify-content:space-between;
position:sticky;
top:0;
z-index:999;
box-shadow:0 4px 10px rgba(0,0,0,.1);
}

.header-left{
display:flex;
align-items:center;
gap:20px;
}

.logo-box img{
height:50px;
background:white;
padding:3px;
border-radius:8px;
}

nav a{
color:white;
text-decoration:none;
margin:0 12px;
font-weight:bold;
}

nav a:hover{
color:#ffd43b;
}

/* BODY */
body{
background:#f4f8fc;
}

/* CENTER BOX */
.wrapper{
min-height:90vh;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
}

.box{
background:white;
width:100%;
max-width:520px;
padding:35px;
border-radius:18px;
box-shadow:0 10px 30px rgba(0,0,0,.12);
border-top:5px solid #0d6efd;
}

.title{
text-align:center;
color:#0d6efd;
font-weight:bold;
margin-bottom:20px;
}

/* FORM */
input,select{
width:100%;
padding:12px;
margin:8px 0;
border:1px solid #ccc;
border-radius:8px;
}

button{
padding:12px;
border:none;
border-radius:8px;
cursor:pointer;
font-weight:bold;
}

.btn-green{
background:#198754;
color:white;
width:100%;
}

.btn-blue{
background:#0d6efd;
color:white;
width:100%;
}

/* OTP FIELDS */
#phoneDiv,#mailDiv{
display:none;
}

/* FOOTER */
footer{
text-align:center;
padding:15px;
background:#001b4d;
color:white;
margin-top:20px;
}

.eye-btn{
background:#e9ecef;
border:none;
padding:10px;
border-radius:0 8px 8px 0;
cursor:pointer;
}

.input-group{
display:flex;
}

.input-group input{
flex:1;
border-radius:8px 0 0 8px;
}

</style>

<script>
function showField(){

let method=document.getElementById("method").value;

document.getElementById("phoneDiv").style.display="none";
document.getElementById("mailDiv").style.display="none";

if(method=="phone"){
document.getElementById("phoneDiv").style.display="block";
}

if(method=="mail"){
document.getElementById("mailDiv").style.display="block";
}
}

function togglePass(id){
let x=document.getElementById(id);
x.type = (x.type=="password") ? "text" : "password";
}

window.onload=showField;
</script>

</head>

<body>

<!-- HEADER -->
<header>
<div class="header-left">
<div class="logo-box">
<img src="/static/logo.png">
</div>

<nav>
<a href="/">Home</a>
<a href="/#login">Login</a>
<a href="/#contact">Contact</a>
</nav>
</div>

<div style="font-weight:bold;">
Doctor Portal
</div>
</header>

<!-- CENTER -->
<div class="wrapper">

<div class="box">

<h2 class="title">Doctor Forgot Password</h2>

{% if msg %}
<div style="background:#d1e7dd;padding:10px;border-radius:8px;margin-bottom:10px;">
{{ msg }}
</div>
{% endif %}

<form method="POST" action="/doctor_forgot_password">

<label>Doctor ID</label>
<input type="text"
name="doctor_id"
value="{{ doctor_id }}"
required>

<label>Select OTP Method</label>
<select id="method" name="method" onchange="showField()" required>
<option value="">Choose</option>

<option value="phone"
{% if method=='phone' %}selected{% endif %}>
Phone Number
</option>

<option value="mail"
{% if method=='mail' %}selected{% endif %}>
Email
</option>

</select>

<!-- PHONE -->
<div id="phoneDiv">
<label>Registered Phone</label>
<input type="text" name="phone" value="{{ phone }}">
</div>

<!-- EMAIL -->
<div id="mailDiv">
<label>Registered Email</label>
<input type="email" name="email" value="{{ email }}">
</div>

<button type="submit" name="send_otp" class="btn-green">
Get OTP
</button>

{% if show_otp %}

<hr style="margin:15px 0;">

<label>Enter OTP</label>
<input type="text" name="otp" required>

<label>New Password</label>
<div class="input-group">
<input type="password" id="newpass" name="new_password" required>
<button type="button" class="eye-btn" onclick="togglePass('newpass')">👁</button>
</div>

<label>Confirm Password</label>
<div class="input-group">
<input type="password" id="confpass" name="confirm_password" required>
<button type="button" class="eye-btn" onclick="togglePass('confpass')">👁</button>
</div>

<button type="submit" name="update_password" class="btn-blue" style="margin-top:10px;">
Update Password
</button>

{% endif %}

</form>

</div>

</div>

<footer>
© 2026 Heal Care Hospital | Doctor Portal
</footer>

</body>
</html>
