<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Heal Care Hospital - Patient Registration</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, sans-serif;
}

body{
background:linear-gradient(135deg,#eaf3ff,#f8fbff);
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:30px;
}

/* MAIN BOX */
.register-container{
width:100%;
max-width:1000px;
background:white;
border-radius:22px;
overflow:hidden;
box-shadow:0 15px 35px rgba(0,0,0,.12);
display:grid;
grid-template-columns:380px 1fr;
}

/* LEFT SIDE */
.left-panel{
background:linear-gradient(135deg,#0d6efd,#003ea9);
color:white;
padding:45px 30px;
text-align:center;
display:flex;
flex-direction:column;
justify-content:center;
}

.left-panel img{
width:95px;
height:95px;
object-fit:contain;
background:white;
padding:10px;
border-radius:50%;
margin:auto;
margin-bottom:20px;
}

.left-panel h1{
font-size:34px;
margin-bottom:12px;
}

.left-panel h3{
font-size:18px;
font-weight:normal;
margin-bottom:25px;
opacity:.95;
}

.left-panel p{
font-size:15px;
line-height:28px;
opacity:.95;
}

/* RIGHT SIDE */
.right-panel{
padding:45px 40px;
}

.form-title{
font-size:32px;
color:#0d6efd;
margin-bottom:8px;
font-weight:bold;
}

.form-sub{
color:#666;
margin-bottom:28px;
}

form label{
display:block;
margin-bottom:6px;
font-weight:bold;
color:#333;
font-size:14px;
}

form input[type="text"],
form input[type="number"],
form input[type="email"],
form input[type="password"]{
width:100%;
padding:13px 14px;
border:1px solid #d6d6d6;
border-radius:10px;
outline:none;
font-size:15px;
margin-bottom:18px;
}

form input:focus{
border-color:#0d6efd;
box-shadow:0 0 0 3px rgba(13,110,253,.10);
}

/* ROW */
.row{
display:grid;
grid-template-columns:1fr 1fr;
gap:18px;
}

/* GENDER */
.gender-box{
margin-bottom:18px;
}

.gender-box input{
margin-right:6px;
margin-left:10px;
}

.gender-box input:first-child{
margin-left:0;
}

/* PASSWORD AREA */
.pass-wrap{
display:flex;
gap:10px;
margin-bottom:18px;
}

.pass-wrap input{
margin-bottom:0 !important;
}

.eye-btn{
padding:0 16px;
border:none;
background:#0d6efd;
color:white;
border-radius:10px;
cursor:pointer;
font-size:18px;
}

#strengthMessage{
margin-top:-8px;
margin-bottom:18px;
font-size:14px;
font-weight:bold;
}

/* BUTTON */
.submit-btn{
width:100%;
padding:15px;
border:none;
background:linear-gradient(135deg,#0d6efd,#0046c7);
color:white;
font-size:17px;
font-weight:bold;
border-radius:12px;
cursor:pointer;
margin-top:5px;
}

.submit-btn:hover{
transform:translateY(-1px);
box-shadow:0 10px 20px rgba(13,110,253,.18);
}

.bottom-text{
text-align:center;
margin-top:18px;
font-size:14px;
color:#666;
}

.bottom-text a{
color:#0d6efd;
font-weight:bold;
text-decoration:none;
}

/* MOBILE */
@media(max-width:900px){

.register-container{
grid-template-columns:1fr;
}

.left-panel{
padding:35px 25px;
}

.right-panel{
padding:35px 25px;
}

.row{
grid-template-columns:1fr;
}

}

</style>
</head>

<body>

<div class="register-container">

<!-- LEFT -->
<div class="left-panel">

<img src="/static/logo.png">

<h1>Heal Care</h1>
<h3>Hospital Management System</h3>

<p>
Trusted healthcare with expert doctors, secure records,
quality treatment and better patient care.
</p>

</div>

<!-- RIGHT -->
<div class="right-panel">

<div class="form-title">Patient Registration</div>
<div class="form-sub">Create your account to access Heal Care services.</div>

<form method="POST" action="/patient_register">

<div class="row">

<div>
<label>Full Name</label>
<input type="text" name="name" required>
</div>

<div>
<label>Age</label>
<input type="number" name="age" required>
</div>

</div>

<div class="row">

<div>
<label>Phone Number</label>
<input type="text" name="phone" required>
</div>

<div>
<label>Place</label>
<input type="text" name="place" required>
</div>

</div>

<label>Gender</label>
<div class="gender-box">
<input type="radio" name="gender" value="Male"> Male
<input type="radio" name="gender" value="Female"> Female
</div>

<label>Email Address</label>
<input type="email" name="email" required>

<label>Password</label>
<div class="pass-wrap">
<input type="password" id="password" name="password" onkeyup="checkPasswordStrength()" required>
<button type="button" class="eye-btn" onclick="togglePassword()">👁</button>
</div>

<div id="strengthMessage"></div>

<label>Confirm Password</label>
<div class="pass-wrap">
<input type="password" id="confirm_password" name="confirm_password" required>
<button type="button" class="eye-btn" onclick="toggleConfirmPassword()">👁</button>
</div>

<button type="submit" class="submit-btn">Register Now</button>

<div class="bottom-text">
Already registered? <a href="/">Login Here</a>
</div>

</form>

</div>
</div>

<script>

function checkPasswordStrength(){

let password = document.getElementById("password").value
let strength = document.getElementById("strengthMessage")

let score = 0

if(password.length >= 8){
score++
}

if(password.match(/[a-z]/)){
score++
}

if(password.match(/[A-Z]/)){
score++
}

if(password.match(/[0-9]/)){
score++
}

if(password.match(/[^a-zA-Z0-9]/)){
score++
}

if(score <= 2){
strength.innerHTML = "<span style='color:red'>Weak Password</span>"
}

else if(score == 3 || score == 4){
strength.innerHTML = "<span style='color:orange'>Medium Password</span>"
}

else if(score == 5){
strength.innerHTML = "<span style='color:green'>Strong Password</span>"
}

}

</script>

<script>

function togglePassword() {

let pass = document.getElementById("password")

if(pass.type === "password"){
pass.type = "text"
}
else{
pass.type = "password"
}

}

function toggleConfirmPassword() {

let pass = document.getElementById("confirm_password")

if(pass.type === "password"){
pass.type = "text"
}
else{
pass.type = "password"
}

}

</script>

</body>
</html>
