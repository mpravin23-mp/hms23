<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Book Appointment</title>
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, sans-serif;
}

body{
background:linear-gradient(135deg,#eaf3ff,#f7fbff);
padding:40px 15px;
color:#222;
}

.main-box{
max-width:900px;
margin:auto;
background:white;
border-radius:18px;
box-shadow:0 15px 35px rgba(0,0,0,.08);
overflow:hidden;
}

.top-bar{
background:#0d6efd;
color:white;
padding:25px;
text-align:center;
}

.top-bar h2{
font-size:34px;
margin-bottom:8px;
}

.top-bar p{
font-size:16px;
opacity:.95;
}

.form-area{
padding:35px;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:22px;
}

.full{
grid-column:1 / -1;
}

label{
display:block;
font-weight:bold;
margin-bottom:8px;
color:#0d3d91;
font-size:15px;
}

input,select,textarea{
width:100%;
padding:13px 14px;
border:1px solid #d8e1ef;
border-radius:10px;
font-size:15px;
outline:none;
transition:.3s;
background:#fff;
}

input:focus,select:focus,textarea:focus{
border-color:#0d6efd;
box-shadow:0 0 0 4px rgba(13,110,253,.10);
}

option:disabled{
color:red;
}

.shift-box{
padding:14px;
background:#eef5ff;
border-radius:10px;
font-size:16px;
font-weight:bold;
}

#shift{
color:#0d6efd;
}

.btn-row{
display:flex;
gap:14px;
margin-top:25px;
}

.btn{
padding:14px 24px;
border:none;
border-radius:10px;
font-size:16px;
font-weight:bold;
cursor:pointer;
text-decoration:none;
text-align:center;
transition:.3s;
}

.primary{
background:#0d6efd;
color:white;
flex:1;
}

.primary:hover{
background:#0b5ed7;
}

.secondary{
background:#e9ecef;
color:#222;
flex:1;
}

.secondary:hover{
background:#dfe3e7;
}

.note{
margin-top:18px;
font-size:14px;
color:#666;
text-align:center;
}

@media(max-width:768px){

.grid{
grid-template-columns:1fr;
}

.form-area{
padding:20px;
}

.top-bar h2{
font-size:28px;
}

}

</style>
</head>
<body>

<div class="main-box">

<div class="top-bar">
<h2>Book New Appointment</h2>
<p>Select doctor, choose slot and confirm your visit easily</p>
</div>

<div class="form-area">

<form method="POST" action="/book_appointment">

<div class="grid">

<div>
<label>Name</label>
<input type="text" name="name" value="{{ patient[1] }}" required>
</div>

<div>
<label>Age</label>
<input type="number" name="age" value="{{ patient[2] }}" required>
</div>

<div class="full">
<label>Place</label>
<input type="text" name="place" value="{{ patient[4] }}" required>
</div>


<!-- ADD THIS EMAIL FIELD INSIDE <div class="grid"> -->

<div>
<label>Email</label>
<input type="email" name="email" value="{{ patient[7] }}" required>
</div>

<div>
<label>Department</label>
<select id="department" name="department" required>
<option value="">Select Department</option>
{% for d in departments %}
<option value="{{ d }}">{{ d }}</option>
{% endfor %}
</select>
</div>

<div>
<label>Doctor</label>
<select id="doctor" name="doctor" required>
<option value="">Select Doctor</option>
</select>
<input type="hidden" name="doctor_name" id="doctor_name">
</div>

<div>
<label>Appointment Date</label>
<input type="date" id="date" name="appointment_date" required min="">
</div>

<div>
<label>Available Slots</label>
<select id="slot" name="appointment_time" required>
<option value="">Select Time</option>
</select>
</div>

<div class="full">
<label>Doctor Shift</label>
<div class="shift-box">
<span id="shift">-</span>
</div>
</div>

<div class="full">
<label>Problem / Reason</label>
<select id="reason" required>
<option value="">Select Problem</option>
</select>
</div>

<div class="full">
<input type="text" id="other_reason" name="problem" placeholder="Enter your problem" style="display:none;">
</div>

</div>

<div class="btn-row">
<button type="submit" class="btn primary">Book Appointment</button>
<a href="/patient_dashboard" class="btn secondary">Back</a>
</div>

<p class="note">Please arrive 10 minutes before your scheduled appointment time.</p>

</form>

</div>
</div>

<script>

// Auto refresh every 5 seconds
setInterval(loadSlots, 5000);


// Load doctors
document.getElementById("department").addEventListener("change", function(){

    let dept = this.value;
    let doctor = document.getElementById("doctor");

    doctor.innerHTML = '<option>Loading...</option>';

    fetch("/get_doctors/" + dept)
    .then(res => res.json())
    .then(data => {

        doctor.innerHTML = '<option value="">Select Doctor</option>';

        data.doctors.forEach(d => {

            let option = document.createElement("option");
            option.value = d.id;
            option.text = d.name;
            option.setAttribute("data-name", d.name);

            doctor.appendChild(option);

        });

    });

});


// Set doctor name
document.getElementById("doctor").addEventListener("change", function(){

    let name = this.options[this.selectedIndex].getAttribute("data-name");
    document.getElementById("doctor_name").value = name;

    loadSlots();

});


// Load slots on date change
document.getElementById("date").addEventListener("change", loadSlots);


// Load slots function
function loadSlots(){

    let doctor = document.getElementById("doctor").value;
    let date = document.getElementById("date").value;

    if(!doctor || !date) return;

    let dropdown = document.getElementById("slot");

    let selectedValue = dropdown.value;

    fetch(`/get_slots/${doctor}/${date}`)
    .then(res => res.json())
    .then(data => {

        dropdown.innerHTML = '<option value="">Select Time</option>';

        document.getElementById("shift").innerText = data.shift;

        data.slots.forEach(slot => {

            let option = document.createElement("option");

            option.value = slot.time;
            option.text = slot.time + " (" + slot.status + ")";

            if(slot.status === "Booked"){
                option.disabled = true;
                option.style.color = "red";
            } else {
                option.style.color = "green";
            }

            if(slot.time === selectedValue){
                option.selected = true;
            }

            dropdown.appendChild(option);

        });

    });

}

</script>

<script>

// Load diseases based on department
document.getElementById("department").addEventListener("change", function(){

    let dept = this.value;
    let reason = document.getElementById("reason");

    reason.innerHTML = '<option value="">Select Problem</option>';

    let diseases = {

        "Cardiology": ["Chest Pain","Heart Attack","High BP","Low BP","Palpitations"],
        "Dermatology": ["Skin Allergy","Acne","Rash","Eczema","Itching"],
        "Neurology": ["Headache","Migraine","Seizures","Nerve Pain","Dizziness"],
        "Pediatrics": ["Fever","Cold","Vaccination","Child Growth Issue","Cough"],
        "Orthopedics": ["Joint Pain","Fracture","Back Pain","Knee Pain","Muscle Pain"],
        "General Surgery": ["Appendicitis","Hernia","Gallbladder Stones","Wound Care","Abdominal Pain"],
        "ENT": ["Ear Pain","Throat Infection","Nose Block","Sinus","Hearing Problem"],
        "Psychiatry": ["Depression","Anxiety","Stress","Sleep Disorder","Panic Attack"],
        "Gynecology": ["Menstrual Problem","Pregnancy Checkup","PCOS","Infertility","Pelvic Pain"]

    };

    if(diseases[dept]){

        diseases[dept].forEach(item => {

            let option = document.createElement("option");
            option.value = item;
            option.text = item;

            reason.appendChild(option);

        });

    }

    let other = document.createElement("option");
    other.value = "Other";
    other.text = "Other";

    reason.appendChild(other);

});

document.getElementById("reason").addEventListener("change", function(){

    let otherInput = document.getElementById("other_reason");

    if(this.value === "Other"){
        otherInput.style.display = "block";
        otherInput.required = true;
    } else {
        otherInput.style.display = "none";
        otherInput.required = false;
    }

});

document.querySelector("form").addEventListener("submit", function(){

    let reasonDropdown = document.getElementById("reason");
    let otherInput = document.getElementById("other_reason");

    if(reasonDropdown.value !== "Other"){
        otherInput.value = reasonDropdown.value;
    }

});

</script>

<script>

let today = new Date().toISOString().split("T")[0];
document.getElementById("date").setAttribute("min", today);

</script>

</body>
</html>
