<!DOCTYPE html>
<html>
<head>
<title>Hospital Reports</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
    font-family:'Poppins', sans-serif;
    background:#f4f6f9;
}

/* HEADER */
.header{
    text-align:center;
    margin:30px 0;
}

.header h2{
    color:#0d6efd;
    font-weight:700;
}

/* CARD */
.card{
    border:none;
    border-radius:15px;
    box-shadow:0 6px 18px rgba(0,0,0,0.08);
    transition:0.3s;
}

.card:hover{
    transform:translateY(-5px);
}

.icon{
    font-size:35px;
}

/* COLORS */
.patients{color:#198754;}
.doctors{color:#0d6efd;}
.appointments{color:#ffc107;}
.revenue{color:#dc3545;}

</style>

</head>

<body>

<div class="container">

    <!-- HEADER -->
    <div class="header">
        <h2>🏥 Hospital Reports Dashboard</h2>
        <p class="text-muted">Overview of hospital performance</p>
    </div>

    <!-- CARDS -->
    <div class="row g-4">

        <div class="col-md-3">
            <div class="card p-4 text-center">
                <div class="icon patients">👨‍👩‍👧‍👦</div>
                <h6>Total Patients</h6>
                <h3>{{ patients }}</h3>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card p-4 text-center">
                <div class="icon doctors">🩺</div>
                <h6>Total Doctors</h6>
                <h3>{{ doctors }}</h3>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card p-4 text-center">
                <div class="icon appointments">📅</div>
                <h6>Total Appointments</h6>
                <h3>{{ appointments }}</h3>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card p-4 text-center">
                <div class="icon revenue">💰</div>
                <h6>Total Revenue</h6>
                <h3>₹ {{ revenue or 0 }}</h3>
            </div>
        </div>

    </div>

    <!-- CHART -->
    <div class="card p-4 mt-5">
        <h5 class="mb-3">Analytics Overview</h5>
        <canvas id="reportChart"></canvas>
    </div>

</div>

<script>
const patients = Number("{{ patients or 0 }}");
const doctors = Number("{{ doctors or 0 }}");
const appointments = Number("{{ appointments or 0 }}");
const revenue = Number("{{ revenue or 0 }}");

new Chart(document.getElementById('reportChart'), {
    type: 'bar',
    data: {
        labels: ['Patients', 'Doctors', 'Appointments', 'Revenue'],
        datasets: [{
            data: [patients, doctors, appointments, revenue],
            backgroundColor: ['#198754','#0d6efd','#ffc107','#dc3545']
        }]
    }
});
</script>

</body>
</html>
