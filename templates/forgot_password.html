<!DOCTYPE html>
<html>
<head>
<title>Heal Care Hospital - Forgot Password</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">

<style>

/* PAGE BACKGROUND */
body{
margin:0;
font-family:Arial,sans-serif;
background:#f4f7fb;
}

/* TOP HEADER */
.header{
background:linear-gradient(135deg,#0d6efd,#0a58ca);
padding:15px 25px;
color:white;
display:flex;
align-items:center;
justify-content:space-between;
box-shadow:0 4px 15px rgba(0,0,0,.15);
}

.header .brand{
display:flex;
align-items:center;
gap:12px;
font-weight:bold;
font-size:20px;
}

.header img{
width:45px;
height:45px;
object-fit:contain;
border-radius:8px;
background:white;
padding:3px;
}

/* CENTER CONTAINER */
.wrapper{
min-height:90vh;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
}

/* CARD */
.box{
background:white;
width:100%;
max-width:540px;
padding:35px;
border-radius:18px;
box-shadow:0 10px 40px rgba(0,0,0,.12);
border-top:5px solid #0d6efd;
}

/* TITLE */
.title{
text-align:center;
font-weight:700;
color:#0d6efd;
margin-bottom:20px;
}

/* FORM */
.form-control, .form-select{
border-radius:10px;
padding:10px;
}

/* BUTTONS */
.btn{
border-radius:10px;
font-weight:500;
}

/* HIDE FIELDS */
#phoneDiv,#mailDiv{
display:none;
}

/* PASSWORD ICON */
.eye-btn{
border:none;
background:#e9ecef;
padding:0 15px;
border-radius:0 10px 10px 0;
cursor:pointer;
}

.footer{
text-align:center;
padding:10px;
font-size:13px;
color:#6c757d;
}

</style>

<script>
function showField(){

let method=document.getElementById("method").value;

document.getElementById("phoneDiv").style.display="none";
document.getElementById("mailDiv").style.display="none";

if(method=="phone"){
document.getElementById("phoneDiv").style.display="block";
}

if(method=="mail"){
document.getElementById("mailDiv").style.display="block";
}
}

function togglePass(id){

let x=document.getElementById(id);

if(x.type=="password"){
x.type="text";
}else{
x.type="password";
}
}

window.onload=function(){
showField();
}
</script>

</head>

<body>

<!-- HEADER -->
<div class="header">
    <div class="brand">
        <img src="{{ url_for('static', filename='logo.png') }}">
        HEAL CARE HOSPITAL
    </div>
</div>

<!-- CENTER -->
<div class="wrapper">

<div class="box">

<h3 class="title">Forgot Password</h3>

{% if msg %}
<div class="alert alert-info text-center">{{ msg }}</div>
{% endif %}

<form method="POST" action="/forgot_password">

<label>Patient ID</label>
<input type="text"
name="patient_id"
value="{{ patient_id }}"
class="form-control mb-3"
required>

<label>Select OTP Method</label>
<select
id="method"
name="method"
class="form-select mb-3"
onchange="showField()"
required>

<option value="">Choose</option>

<option value="phone"
{% if method=='phone' %}selected{% endif %}>
Phone Number
</option>

<option value="mail"
{% if method=='mail' %}selected{% endif %}>
Email
</option>

</select>

<!-- PHONE -->
<div id="phoneDiv" class="mb-3">
<label>Registered Phone Number</label>
<input type="text"
name="phone"
value="{{ phone }}"
class="form-control">
</div>

<!-- EMAIL -->
<div id="mailDiv" class="mb-3">
<label>Registered Email</label>
<input type="email"
name="email"
value="{{ email }}"
class="form-control">
</div>

<button type="submit"
name="send_otp"
class="btn btn-success w-100">
Get OTP
</button>

{% if show_otp %}
<hr>

<label class="mt-3">Enter OTP</label>
<input type="text"
name="otp"
class="form-control mb-3"
required>

<label>New Password</label>
<div class="input-group mb-3">
<input type="password"
id="newpass"
name="new_password"
class="form-control"
required>

<button type="button"
class="eye-btn"
onclick="togglePass('newpass')">👁</button>
</div>

<label>Confirm Password</label>
<div class="input-group mb-3">
<input type="password"
id="confpass"
name="confirm_password"
class="form-control"
required>

<button type="button"
class="eye-btn"
onclick="togglePass('confpass')">👁</button>
</div>

<button type="submit"
name="update_password"
class="btn btn-primary w-100">
Update Password
</button>
{% endif %}

</form>

</div>

</div>

<div class="footer">
© 2026 Heal Care Hospital | All Rights Reserved
</div>

</body>
</html>
